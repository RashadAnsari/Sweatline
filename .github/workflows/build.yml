name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Pinned rather than floating on stable: an unpinned channel silently
      # moves to whatever stable is newest, so CI reports analyzer warnings
      # against an SDK no developer has, and nobody can reproduce them
      # locally. Raise this deliberately, together with the local SDK.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.1
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Format is checked before gen-l10n so generated (untracked) sources
      # cannot fail the check.
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze

      # Golden tests are pixel-exact only on the platform that generated
      # them, so they are excluded here.
      - name: Run tests
        run: flutter test --exclude-tags golden
