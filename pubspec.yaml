name: sweatline
description: "Personal training app: generates a workout plan, guides you through gym sessions, and tracks progress."
publish_to: 'none'
version: 1.5.0+8

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^22.1.0
  flutter_timezone: ^5.1.0
  intl: any
  package_info_plus: ^10.2.0
  path: ^1.9.1
  share_plus: ^13.2.1
  sqflite: ^2.4.2+1
  timezone: ^0.11.1
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  sqflite_common_ffi: ^2.4.0+3

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf

# Launcher icons are generated from assets/icon/app_icon.png, which itself
# is produced by test/tools/app_icon_test.dart (run with --update-goldens).
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true

# Native splash screen shown before Flutter boots. This replaces the blank
# white launch screen. The logo is assets/splash/splash_logo.png, produced
# by test/tools/splash_logo_test.dart (run with --update-goldens).
# Regenerate the native splash with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#12140D"
  color_dark: "#12140D"
  image: assets/splash/splash_logo.png
  image_dark: assets/splash/splash_logo.png
  android_12:
    color: "#12140D"
    color_dark: "#12140D"
    image: assets/splash/splash_logo.png
    image_dark: assets/splash/splash_logo.png
